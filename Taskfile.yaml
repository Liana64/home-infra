---
version: "3"

vars:
  KUBERNETES_DIR: "{{.ROOT_DIR}}/kubernetes"
  KUBECONFIG_FILE: "{{.ROOT_DIR}}/kubeconfig"
  SCRIPTS_DIR: "{{.ROOT_DIR}}/scripts"
  SOPS_CONFIG_FILE: "{{.ROOT_DIR}}/.sops.yaml"
  AGE_DIR: "/home/liana/.config/sops/age"
  AGE_FILE: "{{.AGE_DIR}}/milberry.key"
  CLUSTER: "main"
  CLUSTER_NAME: "milberry"
env:
  KUBECONFIG: "{{.KUBECONFIG_FILE}}"
  SOPS_AGE_KEY_FILE: "{{.AGE_FILE}}"

dotenv: [".env"]

includes:
  flux:
    taskfile: .taskfiles/flux.yaml
    aliases: [f]
  kubernetes:
    taskfile: .taskfiles/kubernetes.yaml
    aliases: [k]
  sops:
    taskfile: .taskfiles/sops.yaml
    aliases: [s]
  talos:
    taskfile: .taskfiles/talos.yaml
    aliases: [t]
  tofu:
    taskfile: .taskfiles/tofu.yaml
  ansible:
    taskfile: .taskfiles/ansible.yaml
    aliases: [a]
  volsync:
    taskfile: .taskfiles/volsync.yaml
    aliases: [v]
  n8n:
    taskfile: .taskfiles/n8n.yaml
    aliases: [n]
  precommit: .taskfiles/precommit.yaml

tasks:
  default:
    silent: true
    cmds:
      - task -l

  init:
    desc: Install git hooks and setup sops age key
    cmds:
      - task: precommit:init
      - task: sops:setup

  check:
    desc: Validate the repo (pre-commit, kubeconform, tofu fmt)
    cmds:
      - pre-commit run --all-files
      - task: kubernetes:kubeconform
      - tofu fmt -check -recursive {{.ROOT_DIR}}/tofu

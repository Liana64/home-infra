---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      renovate:
        type: cronjob
        cronjob:
          schedule: "0 8 * * *"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        pod:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
              repository: ghcr.io/renovatebot/renovate
              tag: 43.220.0
            env:
              LOG_LEVEL: info
              RENOVATE_PLATFORM: forgejo
              RENOVATE_ENDPOINT: "https://git.${ORG_DOMAIN}/api/v1"
              RENOVATE_AUTODISCOVER: "false"
              RENOVATE_REPOSITORIES: liana/home-infra
              RENOVATE_ONBOARDING: "false"
              RENOVATE_REQUIRE_CONFIG: required
              RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@git.${ORG_DOMAIN}>"
              RENOVATE_BASE_DIR: /tmp/renovate
            envFrom:
              - secretRef:
                  name: renovate-secret
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

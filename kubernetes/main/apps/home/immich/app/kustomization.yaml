---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/volsync
resources:
  - ../../../database/cloudnative-pg/app/secret.sops.yaml
  - ./configmap.yaml
  - ./dashboard.yaml
  - ./helmrelease.yaml
  - ./prometheusrule.yaml
  - ./secret.sops.yaml
patches:
  - target:
      group: volsync.backube
      version: v1alpha1
      kind: ReplicationSource
    patch: |
      - op: replace
        path: /spec/trigger
        value:
          schedule: "0 4 * * *"
      - op: replace
        path: /spec/sourcePVC
        value: immich-data
  - patch: |
      $patch: delete
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationDestination
      metadata:
        name: ${APP}-dst

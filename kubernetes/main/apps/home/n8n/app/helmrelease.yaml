---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      n8n:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/onedr0p/postgres-init
              tag: 16
            env:
              INIT_POSTGRES_HOST: &dbHost postgres-1-rw.database.svc.cluster.local
              INIT_POSTGRES_DBNAME: &dbName n8n
              INIT_POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: &secret n8n-secret
                    key: DB_POSTGRESDB_USER
              INIT_POSTGRES_PASS:
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: DB_POSTGRESDB_PASSWORD
              INIT_POSTGRES_SUPER_PASS:
                valueFrom:
                  secretKeyRef:
                    name: cloudnative-pg-secret
                    key: password
        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/n8n-io/n8n
            image:
              repository: ghcr.io/n8n-io/n8n
              tag: 2.22.2@sha256:bf26d48e2be3d8a2bda50c5494dc603f495c2d98bd186793773b0204f3e7e0c3
            env:
              TZ: ${TIMEZONE}
              GENERIC_TIMEZONE: ${TIMEZONE}
              DB_TYPE: postgresdb
              DB_POSTGRESDB_HOST: *dbHost
              DB_POSTGRESDB_PORT: "5432"
              DB_POSTGRESDB_DATABASE: *dbName
              EXECUTIONS_DATA_PRUNE: "true"
              EXECUTIONS_DATA_MAX_AGE: "168"
              EXECUTIONS_DATA_PRUNE_MAX_COUNT: "50000"
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
              N8N_PROTOCOL: https
              N8N_PORT: &port 5678
              N8N_HOST: &host "n8n.${PUBLIC_DOMAIN}"
              N8N_EDITOR_BASE_URL: "https://n8n.${PUBLIC_DOMAIN}"
              WEBHOOK_URL: "https://n8n.${PUBLIC_DOMAIN}/"
              N8N_LOG_LEVEL: info
              N8N_LOG_OUTPUT: console
              N8N_TRUST_PROXY: "true"
              N8N_RUNNERS_ENABLED: "true"
            envFrom:
              - secretRef:
                  name: *secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-chain-no-auth@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Home
          gethomepage.dev/name: n8n
          gethomepage.dev/description: Workflow automation
          gethomepage.dev/icon: n8n
        hosts:
          - host: *host
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: n8n-tls
            hosts: [*host]
    persistence:
      data:
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 2Gi
        retain: true
        globalMounts:
          - path: /home/node/.n8n

---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../components/volsync
resources:
  - ./networkpolicy.yaml
  - ./helmrelease.yaml
patches:
  - target:
      group: volsync.backube
      version: v1alpha1
      kind: ReplicationSource
    patch: |
      - op: replace
        path: /spec/trigger
        value:
          schedule: "0 3 * * *"
  # Drop the ReplicationDestination: volsync fires a manual trigger
  # once on creation regardless of value. Restore is a manual op —
  # create an RD on-demand when actually restoring.
  - patch: |
      $patch: delete
      apiVersion: volsync.backube/v1alpha1
      kind: ReplicationDestination
      metadata:
        name: ${APP}-dst

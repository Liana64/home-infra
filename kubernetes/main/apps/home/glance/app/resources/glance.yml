server:
  host: 0.0.0.0
  port: 8080

theme:
  background-color: 0 0 13
  primary-color: 232 76 63
  positive-color: 70 36 56
  negative-color: 3 77 65
  contrast-multiplier: 1.1

pages:
  - name: Home
    head-widgets:
      - type: search
        search-engine: https://kagi.com/search?q={QUERY}
        new-tab: true
    columns:
      - size: small
        widgets:
          - type: calendar
            first-day-of-week: monday
          - type: bookmarks
            groups:
              - title: Links
                links:
                  - title: Bookmarks
                    url: https://bookmarks.milberry.org
                  - title: RSS
                    url: https://rss.labs.lianas.org
                  - title: Labs
                    url: https://labs.lianas.org
                  - title: Forgejo
                    url: https://git.milberry.org
      - size: full
        widgets:
          - type: group
            widgets:
              - type: hacker-news
              - type: lobsters
                sort-by: hot
                limit: 18
                collapse-after: 10
          - $include: /app/config/reddits.yml
          - type: rss
            title: Forgejo activity
            limit: 15
            collapse-after: 5
            feeds:
              - url: https://git.milberry.org/liana.atom
                title: liana
      - size: small
        widgets:
          - type: weather
            location: Chicago, Illinois, United States
            units: imperial
            hour-format: 12h
          - $include: /app/config/markets.yml
          - type: releases
            show-source-icon: true
            collapse-after: 5
            repositories:
              - siderolabs/talos
              - opnsense/core
              - immich-app/immich
              - traefik/traefik
              - atuinsh/atuin
              - gethomepage/homepage
              - jellyfin/jellyfin
              - seerr-team/seerr
              - sissbruecker/linkding
              - miniflux/v2
              - techarohq/anubis
              - syncthing/syncthing
              - open-webui/open-webui
              - dragonflydb/dragonfly
              - fluxcd/flux2
              - Kozea/Radicale
              - glanceapp/glance
              - openebs/openebs
  - name: Videos
    columns:
      - size: full
        widgets:
          - $include: /app/config/videos.yml

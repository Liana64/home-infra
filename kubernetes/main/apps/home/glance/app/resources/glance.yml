server:
  host: 0.0.0.0
  port: 8080

theme:
  background-color: 0 0 13
  primary-color: 344 47 68
  positive-color: 70 36 56
  negative-color: 3 77 65
  contrast-multiplier: 1.1

pages:
  - name: Home
    head-widgets:
      - type: search
        search-engine: https://kagi.com/search?q={QUERY}
        new-tab: true
        autofocus: true
    columns:
      - size: small
        widgets:
          - type: weather
            location: Chicago, Illinois, United States
            units: imperial
            hour-format: 12h
          - type: calendar
            first-day-of-week: monday
          - $include: /app/config/events.yml
          - type: bookmarks
            groups:
              - title: Home
                links:
                  - title: Bookmarks
                    url: https://bookmarks.milberry.org
                  - title: RSS
                    url: https://rss.labs.lianas.org
                  - title: Photos
                    url: https://immich.milberry.org
              - title: Lab
                links:
                  - title: Dashboard
                    url: https://labs.lianas.org
                  - title: Pull Requests
                    url: https://git.milberry.org/liana/home-infra/pulls
                  - title: Forgejo
                    url: https://git.milberry.org
                  - title: Speedtest
                    url: https://grafana.labs.lianas.org/d/speedtest/speedtest?orgId=1&from=now-7d&to=now&timezone=browser
              - title: Links
                links:
                  - title: Weekly Meal Plan
                    url: https://docs.google.com/document/d/1-267mJ9Km8iLBJym0Hw0ZzYB6mrTGJaP-F5OHjJEMNc/edit?tab=t.0
                  - title: Hardware Prices
                    url: https://pcpartpicker.com/trends/
              - title: AI
                links:
                  - title: Rankings
                    url: https://openrouter.ai/rankings
                  - title: Leaderboard
                    url: https://lmarena.ai/leaderboard
          - $include: /app/config/markets.yml
          - type: custom-api
            title: xkcd
            cache: 12h
            url: https://xkcd.com/info.0.json
            template: |
              <a href="https://xkcd.com/{{ .JSON.Int "num" }}" target="_blank">
                <img src="{{ .JSON.String "img" }}" alt="{{ .JSON.String "alt" }}" title="{{ .JSON.String "alt" }}" referrerpolicy="no-referrer" style="max-width:100%;height:auto">
              </a>
              <p style="margin-top:.5rem;font-size:.9em">{{ .JSON.String "title" }}</p>
      - size: full
        widgets:
          - type: group
            widgets:
              - type: custom-api
                title: Chicago
                cache: 1h
                url: http://n8n.home.svc.cluster.local:5678/webhook/chicago-digest
                template: |
                  <div class="size-h3 color-primary margin-bottom-3">This week</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "week" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
                  <div class="size-h3 color-primary margin-bottom-3 margin-top-10">This weekend</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "weekend" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
              - type: custom-api
                title: Industry
                cache: 1h
                url: http://n8n.home.svc.cluster.local:5678/webhook/industry-digest
                template: |
                  <div class="size-h3 color-primary margin-bottom-3">Week</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "week" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
                  <div class="size-h3 color-primary margin-bottom-3 margin-top-10">Month</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "month" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
              - type: custom-api
                title: AI
                cache: 1h
                url: http://n8n.home.svc.cluster.local:5678/webhook/ai-digest
                template: |
                  <div class="size-h3 color-primary margin-bottom-3">Week</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "week" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
                  <div class="size-h3 color-primary margin-bottom-3 margin-top-10">Month</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "month" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
              - type: custom-api
                title: Politics
                cache: 1h
                url: http://n8n.home.svc.cluster.local:5678/webhook/politics-digest
                template: |
                  {{ if .JSON.Array "week" }}
                  <div class="size-h3 color-primary margin-bottom-3">Week</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "week" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
                  {{ end }}
                  {{ if .JSON.Array "month" }}
                  <div class="size-h3 color-primary margin-bottom-3 margin-top-10">Month</div>
                  <ul class="list list-gap-2" style="list-style: disc; padding-left: 1.2rem;">
                  {{ range .JSON.Array "month" }}<li>{{ .String "" }}</li>{{ end }}
                  </ul>
                  {{ end }}
          - type: group
            widgets:
              - type: lobsters
                sort-by: hot
                limit: 18
                collapse-after: 10
              - type: hacker-news
              - type: rss
                title: LWN
                limit: 15
                collapse-after: 5
                feeds:
                  - url: https://lwn.net/headlines/rss
              - type: rss
                title: Chicago
                limit: 15
                collapse-after: 5
                feeds:
                  - url: https://chicago.suntimes.com/rss/index.xml
          - type: custom-api
            title: Forgejo activity
            cache: 30m
            url: https://git.milberry.org/api/v1/users/liana/activities/feeds?limit=15
            headers:
              Authorization: token $${FORGEJO_TOKEN}
            template: |
              <ul class="list list-gap-10 collapsible-container" data-collapse-after="5">
              {{ range .JSON.Array "" }}
                {{ if .Exists "repo.full_name" }}
                <li>
                  <a class="size-h4 color-primary-if-not-visited block text-truncate" href="{{ .String "repo.html_url" }}" target="_blank">{{ .String "repo.full_name" }}</a>
                  <ul class="list-horizontal-text">
                    <li>{{ replaceAll "_" " " (.String "op_type") }}</li>
                    <li {{ .String "created" | parseTime "rfc3339" | toRelativeTime }}></li>
                  </ul>
                </li>
                {{ end }}
              {{ end }}
              </ul>
      - size: small
        widgets:
          - type: custom-api
            title: Alerts
            cache: 2m
            url: https://alertmanager.labs.lianas.org/api/v2/alerts?active=true&silenced=false&inhibited=false
            template: |
              {{ $alerts := 0 }}
              <ul class="list list-gap-10 collapsible-container" data-collapse-after="5">
              {{ range sortByTime "startsAt" "rfc3339" "desc" (.JSON.Array "") }}
                {{ if ne (.String "labels.alertname") "Watchdog" }}
                {{ $alerts = add $alerts 1 }}
                <li>
                  <div class="size-h4{{ if eq (.String "labels.severity") "critical" }} color-negative{{ end }}">{{ .String "labels.alertname" }}</div>
                  <ul class="list-horizontal-text">
                    <li>{{ .String "labels.severity" }}</li>
                    {{ if .Exists "labels.namespace" }}<li>{{ .String "labels.namespace" }}</li>{{ end }}
                    <li {{ .String "startsAt" | parseTime "rfc3339" | toRelativeTime }}></li>
                  </ul>
                </li>
                {{ end }}
              {{ end }}
              </ul>
              {{ if eq $alerts 0 }}<p class="color-positive">All clear</p>{{ end }}
          - type: custom-api
            title: Speedtest
            cache: 1h
            url: https://prometheus.labs.lianas.org/api/v1/query?query=last_over_time(%7B__name__%3D~%22speedtest_(download_bits_per_second%7Cupload_bits_per_second%7Cping_latency_milliseconds)%22%7D%5B24h%5D)
            template: |
              {{ $down := .JSON.Float `data.result.#(metric.__name__=="speedtest_download_bits_per_second").value.1` }}
              {{ $up := .JSON.Float `data.result.#(metric.__name__=="speedtest_upload_bits_per_second").value.1` }}
              {{ $ping := .JSON.Float `data.result.#(metric.__name__=="speedtest_ping_latency_milliseconds").value.1` }}
              <div class="flex justify-between text-center">
                <div>
                  <div class="color-highlight size-h3">{{ printf "%.0f" (div $down 1000000.0) }}</div>
                  <div class="size-h6">MBPS DOWN</div>
                </div>
                <div>
                  <div class="color-highlight size-h3">{{ printf "%.0f" (div $up 1000000.0) }}</div>
                  <div class="size-h6">MBPS UP</div>
                </div>
                <div>
                  <div class="color-highlight size-h3">{{ printf "%.1f" $ping }}</div>
                  <div class="size-h6">PING MS</div>
                </div>
              </div>
          - type: releases
            title: Infra
            show-source-icon: true
            collapse-after: 5
            repositories:
              - siderolabs/talos
              - kubernetes/kubernetes
              - syncthing/syncthing
              - fluxcd/flux2
              - openebs/openebs
          - type: rss
            title: GrapheneOS
            limit: 3
            collapse-after: 3
            feeds:
              - url: https://grapheneos.org/releases.atom
          - type: releases
            title: Android
            show-source-icon: true
            collapse-after: 5
            repositories:
              - bitfireAT/davx5-ose
              - ente/ente
              - immich-app/immich
              - researchxxl/syncthing-android
              - wgtunnel/android
              - breezy-weather/breezy-weather
              - futo-org/android-keyboard
              - localsend/localsend
              - librepods-org/librepods
  - name: Media
    columns:
      - size: small
        widgets:
          - type: custom-api
            title: Requests
            cache: 15m
            url: https://requests.lianas.org/api/v1/request?filter=pending&take=10
            headers:
              X-Api-Key: $${SEERR_API_KEY}
            template: |
              {{ if eq (len (.JSON.Array "results")) 0 }}
              <p>No pending requests</p>
              {{ else }}
              <ul class="list list-gap-10">
              {{ range .JSON.Array "results" }}
                <li>
                  <a class="size-h4 color-primary-if-not-visited" href="https://requests.lianas.org/{{ .String "type" }}/{{ .String "media.tmdbId" }}" target="_blank">{{ .String "type" }} #{{ .String "media.tmdbId" }}</a>
                  <ul class="list-horizontal-text">
                    <li>{{ .String "requestedBy.displayName" }}</li>
                    <li {{ .String "createdAt" | parseTime "rfc3339" | toRelativeTime }}></li>
                  </ul>
                </li>
              {{ end }}
              </ul>
              {{ end }}
      - size: full
        widgets:
          - type: custom-api
            title: Airing
            cache: 30m
            url: https://sonarr.labs.lianas.org/api/v3/calendar?includeSeries=true
            headers:
              X-Api-Key: $${SONARR_API_KEY}
            template: |
              {{ if eq (len (.JSON.Array "")) 0 }}
              <p>Nothing airing today</p>
              {{ else }}
              <ul class="list list-gap-10">
              {{ range .JSON.Array "" }}
                <li>
                  <div class="size-h4 color-primary">{{ .String "series.title" }}</div>
                  <ul class="list-horizontal-text">
                    <li>S{{ printf "%02d" (.Int "seasonNumber") }}E{{ printf "%02d" (.Int "episodeNumber") }}</li>
                    <li>{{ .String "title" }}</li>
                    <li {{ .String "airDateUtc" | parseTime "rfc3339" | toRelativeTime }}></li>
                  </ul>
                </li>
              {{ end }}
              </ul>
              {{ end }}
          - type: group
            widgets:
              - type: custom-api
                title: Sonarr queue
                cache: 5m
                url: https://sonarr.labs.lianas.org/api/v3/queue?pageSize=10
                headers:
                  X-Api-Key: $${SONARR_API_KEY}
                template: &queueTemplate |
                  {{ if eq (len (.JSON.Array "records")) 0 }}
                  <p>Queue empty</p>
                  {{ else }}
                  <ul class="list list-gap-10">
                  {{ range .JSON.Array "records" }}
                    <li>
                      <div class="size-h4 text-truncate">{{ .String "title" }}</div>
                      <ul class="list-horizontal-text">
                        <li>{{ .String "status" }}</li>
                        {{ if gt (.Float "size") 0.0 }}<li>{{ printf "%.0f%%" (mul (sub 1.0 (div (.Float "sizeleft") (.Float "size"))) 100.0) }}</li>{{ end }}
                      </ul>
                    </li>
                  {{ end }}
                  </ul>
                  {{ end }}
              - type: custom-api
                title: Radarr queue
                cache: 5m
                url: https://radarr.labs.lianas.org/api/v3/queue?pageSize=10
                headers:
                  X-Api-Key: $${RADARR_API_KEY}
                template: *queueTemplate

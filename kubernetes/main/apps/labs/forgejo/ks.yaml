---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo
  namespace: flux-system
spec:
  targetNamespace: labs
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: traefik
    - name: cloudnative-pg
    - name: volsync
    - name: kopia
  path: ./kubernetes/main/apps/labs/forgejo/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-infra
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      POSTGRES_HOST: postgres-1-rw.database.svc.cluster.local
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_STORAGECLASS: cluster-nvme

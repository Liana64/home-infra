---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-middleware-ratelimit
spec:
  rateLimit:
    # keyed on client ip, excludedIPs does not exempt sources, do not re-add
    average: 50
    burst: 250
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-middleware-ratelimit-streaming
spec:
  rateLimit:
    average: 100
    burst: 300

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-middleware-anubis
spec:
  forwardAuth:
    address: http://anubis-app.security.svc.cluster.local:8080/.within.website/x/cmd/anubis/api/check
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-middleware-anubis-org
spec:
  forwardAuth:
    address: http://anubis-org.security.svc.cluster.local:8080/.within.website/x/cmd/anubis/api/check
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-middleware-tinyauth
spec:
  forwardAuth:
    address: http://tinyauth.security.svc.cluster.local:3000/api/auth/traefik
    authResponseHeaders:
      - Remote-User
      - Remote-Name
      - Remote-Email
      - Remote-Groups

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: smtp-relay
  namespace: networking
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: smtp-relay
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "25"
              protocol: TCP
    # LAN devices relaying via the LB
    - fromCIDR:
        - "${HOME_CIDR}"
        - "${VPN_CIDR}"
      toPorts:
        - ports:
            - port: "25"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # upstream host lives in the sops secret; pin the submission port only
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "587"
              protocol: TCP

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app jellyfin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      jellyfin:
        # Recreate + grace: never two writers on the SQLite config, and let WAL checkpoint on shutdown
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"

        pod:
          #runtimeClassName: nvidia
          terminationGracePeriodSeconds: 60
          #nodeSelector:
          #  feature.node.kubernetes.io/pci-10de.present: "true"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            #fsGroup: 2000
            fsGroupChangePolicy: "OnRootMismatch"
            #supplementalGroups:
            #  - 3005

        containers:
          app:
            # renovate: datasource=docker depName=ghcr.io/jellyfin/jellyfin
            image:
              repository: ghcr.io/jellyfin/jellyfin
              tag: 10.11.11@sha256:45f648c382a0c8b552582fcea40e95cb17c5d475473a891cba0eb7523fb92112
            env:
              JELLYFIN_PublishedServerUrl: "{{ .Release.Name }}.${PERSONAL_DOMAIN}"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8096
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              # 10.11 EF Core migrations can block /health for minutes; hold liveness off for up to 10m
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 10
                  failureThreshold: 60
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
                #nvidia.com/gpu: 1
              limits:
                memory: 4096Mi
                #nvidia.com/gpu: 1

    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - "n1"

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8096

    ingress:
      app:
        className: traefik-external
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          external-dns.alpha.kubernetes.io/target: "external.${PERSONAL_DOMAIN}"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-ratelimit-streaming@kubernetescrd,networking-traefik-middleware-chain-no-auth@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Jellyfin
          gethomepage.dev/description: Media server
          gethomepage.dev/icon: jellyfin
          #gethomepage.dev/widget.type: "jellyfin"
          #gethomepage.dev/widget.key: "${HOMEPAGE_VAR_JELLYFIN_API_KEY}"
          #gethomepage.dev/widget.url: &host "{{ .Release.Name }}.${PERSONAL_DOMAIN}"
        hosts:
          - host: &host "{{ .Release.Name }}.${PERSONAL_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: jellyfin-tls
            hosts: [*host]

    persistence:
      config:
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 4Gi
        retain: true
        globalMounts:
          - path: /config
      media:
        enabled: true
        existingClaim: qbittorrent-media
        advancedMounts:
          jellyfin:
            app:
              - path: /media
      tmpfs:
        type: emptyDir
        advancedMounts:
          jellyfin:
            app:
              - path: /cache
                subPath: cache
              - path: /transcode
                subPath: transcode
              - path: /tmp
                subPath: tmp

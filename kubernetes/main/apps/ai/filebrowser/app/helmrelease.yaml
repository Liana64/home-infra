---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app filebrowser
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      filebrowser:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/filebrowser/filebrowser
              tag: v2.63.18@sha256:c4c627f687668c5a02ab410d8473712c77be7f1f0ea4f8d624d2a1392c495e76
            env:
              FB_DATABASE: /config/filebrowser.db
              FB_ROOT: /workspace
              FB_LOG: stdout
              FB_PORT: &port 7000
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 16Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    ingress:
      app:
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-chain-no-auth@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Tools
          gethomepage.dev/name: File Browser (AI)
          gethomepage.dev/description: Browse agent files
          gethomepage.dev/icon: filebrowser
        hosts:
          - host: &host "aifs.${PERSONAL_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: ai-filebrowser-tls
            hosts: [*host]

    persistence:
      workspace:
        enabled: true
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 12Gi
        globalMounts:
          - path: /workspace
      claude:
        enabled: true
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 8Gi
        globalMounts:
          - path: /workspace/claude
      codex:
        enabled: true
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /workspace/codex
      openclaw:
        enabled: true
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 8Gi
        globalMounts:
          - path: /home/

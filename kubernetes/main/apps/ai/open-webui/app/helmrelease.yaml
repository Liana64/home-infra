---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      open-webui:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
            env:
              WEBUI_URL: "https://models.${PERSONAL_DOMAIN}"
              ENABLE_SIGNUP: "true"
              DEFAULT_USER_ROLE: "pending"
              ENABLE_OAUTH_SIGNUP: "true"
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
              OAUTH_PROVIDER_NAME: Pocket ID
              OAUTH_CLIENT_ID: open-webui
              OPENID_PROVIDER_URL: "https://id.${ORG_DOMAIN}/.well-known/openid-configuration"
              ENABLE_OLLAMA_API: "false"
              ENABLE_OPENAI_API: "true"
              # env renders sorted, $() expansion breaks if key vars sort after OPENAI_API_KEYS
              LLAMA_CPP_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: llama-cpp-secret
                    key: LLAMA_ARG_API_KEY
              FIREWORKS_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: FIREWORKS_API_KEY
              OPENAI_API_BASE_URLS: http://llama-cpp.ai.svc.cluster.local:8080/v1;https://api.fireworks.ai/inference/v1
              OPENAI_API_KEYS: $(LLAMA_CPP_API_KEY);$(FIREWORKS_API_KEY)
              DATA_DIR: /app/backend/data
            envFrom:
              - secretRef:
                  name: open-webui-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        className: traefik
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-chain-no-auth@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: AI
          gethomepage.dev/name: Open WebUI
          gethomepage.dev/description: Local LLM chat
          gethomepage.dev/icon: open-webui
        hosts:
          - host: &host "models.${PERSONAL_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: open-webui-tls
            hosts: [*host]
    persistence:
      data:
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 5Gi
        retain: true
        globalMounts:
          - path: /app/backend/data

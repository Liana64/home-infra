---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &app open-webui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: open-webui-secret
    template:
      engineVersion: v2
      data:
        WEBUI_SECRET_KEY: "{{ .WEBUI_SECRET_KEY }}"
        OAUTH_CLIENT_SECRET: "{{ .OAUTH_CLIENT_OPENWEBUI }}"
        FIREWORKS_API_KEY: "{{ .FIREWORKS_API_KEY_OPENWEBUI }}"
  data:
    - secretKey: WEBUI_SECRET_KEY
      remoteRef:
        key: "aca5237a-f38e-48da-97a7-b43e0173523c"
    - secretKey: OAUTH_CLIENT_OPENWEBUI
      remoteRef:
        key: "a5023436-c0a6-4230-affb-b48500f5d2fe"
    - secretKey: FIREWORKS_API_KEY_OPENWEBUI
      remoteRef:
        key: "933792bf-6c64-433c-b1e6-b488017226ac"

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qdrant-mcp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      qdrant-mcp:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/astral-sh/uv
              tag: python3.12-bookworm-slim
            command: ["uvx"]
            args: ["mcp-server-qdrant@0.8.1", "--transport", "sse"]
            env:
              QDRANT_URL: http://qdrant.database.svc.cluster.local:6333
              COLLECTION_NAME: claude-memory
              EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
              QDRANT_READ_ONLY: "false"
              FASTMCP_HOST: 0.0.0.0
              FASTMCP_PORT: &port 8000
              HOME: /cache
              UV_CACHE_DIR: /cache/uv
              UV_PYTHON_DOWNLOADS: "never"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 30
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  periodSeconds: 10
                  failureThreshold: 40
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: [ALL]
    service:
      app:
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "${LB_QDRANT_MCP}"
        externalTrafficPolicy: Local
        ports:
          http:
            port: *port
    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

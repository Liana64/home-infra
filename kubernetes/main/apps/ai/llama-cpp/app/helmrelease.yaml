---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama-cpp
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      llama-cpp:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          runtimeClassName: nvidia
          nodeSelector:
            feature.node.kubernetes.io/pci-10de.present: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-cuda-b9976@sha256:93b36c099c8fc978b79fec5a09dedf6573e5e3cef4f2223453dad93e6a273305
            env:
              LLAMA_ARG_HOST: "0.0.0.0"
              LLAMA_ARG_PORT: "8080"
              LLAMA_ARG_HF_REPO: "unsloth/Qwen3.5-9B-GGUF:Q4_K_M"
              LLAMA_ARG_MMPROJ_AUTO: "0"
              LLAMA_ARG_ALIAS: "qwen3.5-9b"
              LLAMA_ARG_N_GPU_LAYERS: "99"
              # 64k q8_0 kv ~1.1GB fits the 8GB card only because GDN keeps kv on 8/32 layers, on OOM drop to 49152
              LLAMA_ARG_CTX_SIZE: "65536"
              LLAMA_ARG_FLASH_ATTN: "on"
              LLAMA_ARG_CACHE_TYPE_K: "q8_0"
              LLAMA_ARG_CACHE_TYPE_V: "q8_0"
              LLAMA_ARG_SLEEP_IDLE_SECONDS: "600"
              LLAMA_CACHE: /models
            envFrom:
              - secretRef:
                  name: llama-cpp-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              # first boot downloads the model, allow up to 30m
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8080
                  periodSeconds: 10
                  failureThreshold: 180
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
                nvidia.com/gpu: 1
              limits:
                memory: 12Gi
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8080
    persistence:
      models:
        storageClass: cluster-nvme
        accessMode: ReadWriteOnce
        size: 50Gi
        retain: true
        globalMounts:
          - path: /models
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

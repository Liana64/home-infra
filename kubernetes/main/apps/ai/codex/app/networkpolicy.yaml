---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: codex
  namespace: ai
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: codex
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: traefik
            app.kubernetes.io/instance: traefik-networking
            io.kubernetes.pod.namespace: networking
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: api.openai.com
        - matchName: github.com
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

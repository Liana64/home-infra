---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pocket-id
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      pocket-id:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/liana64/postgres-init
              tag: 16
            env:
              - name: INIT_POSTGRES_HOST
                value: "postgres-1-rw.database.svc.cluster.local"
              - name: INIT_POSTGRES_DBNAME
                value: pocket-id
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: cloudnative-pg-secret
                    key: password
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: &secret pocket-id-secret
                    key: POCKET_ID_POSTGRES_USER
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: *secret
                    key: POCKET_ID_POSTGRES_PASSWORD
        containers:
          app:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.7.0@sha256:45bdeaf3fcd6d07cf8721e98785d93324bb8e65b586498874c05a3d489c8094e
            env:
              APP_URL: "https://id.${ORG_DOMAIN}"
              DB_PROVIDER: postgres
              ENCRYPTION_KEY_FILE: /encryption/ENCRYPTION_KEY
              KEYS_PATH: /data/keys
              UPLOAD_PATH: /data/uploads
              ANALYTICS_DISABLED: "true"
              TRUST_PROXY: "true"
              TZ: "${TIMEZONE}"
              UI_CONFIG_DISABLED: "true"
              LDAP_ENABLED: "true"
              LDAP_URL: ldap://lldap.security.svc.cluster.local:1389
              LDAP_BASE: dc=milberry,dc=arpa
              LDAP_BIND_DN: uid=admin,ou=people,dc=milberry,dc=arpa
              LDAP_USER_SEARCH_FILTER: "(objectClass=person)"
              LDAP_USER_GROUP_SEARCH_FILTER: "(objectClass=groupOfNames)"
              LDAP_ATTRIBUTE_USER_UNIQUE_IDENTIFIER: uuid
              LDAP_ATTRIBUTE_USER_USERNAME: uid
              LDAP_ATTRIBUTE_USER_EMAIL: mail
              LDAP_ATTRIBUTE_USER_FIRST_NAME: givenName
              LDAP_ATTRIBUTE_USER_LAST_NAME: sn
              LDAP_ATTRIBUTE_USER_PROFILE_PICTURE: jpegPhoto
              LDAP_ATTRIBUTE_GROUP_MEMBER: member
              LDAP_ATTRIBUTE_GROUP_UNIQUE_IDENTIFIER: uuid
              LDAP_ATTRIBUTE_GROUP_NAME: cn
              LDAP_ADMIN_GROUP_NAME: lldap_admin
            envFrom:
              - secretRef:
                  name: *secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 1411
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        className: traefik-external
        annotations:
          cert-manager.io/cluster-issuer: "letsencrypt-production"
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: "networking-traefik-middleware-ratelimit@kubernetescrd,networking-traefik-middleware-chain-no-auth@kubernetescrd"
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Security
          gethomepage.dev/name: Pocket ID
          gethomepage.dev/description: OIDC provider
          gethomepage.dev/icon: pocket-id
        hosts:
          - host: &host "id.${ORG_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - secretName: pocket-id-tls
            hosts: [*host]
    persistence:
      data:
        storageClass: openebs-hostpath
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /data
      var:
        type: emptyDir
        sizeLimit: 1Gi
      encryption:
        type: secret
        name: pocket-id-encryption-secret
        globalMounts:
          - path: /encryption
            readOnly: true

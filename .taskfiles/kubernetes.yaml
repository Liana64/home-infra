---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  KUBECONFORM_SCRIPT: "{{.SCRIPTS_DIR}}/kubeconform.sh"
  KUBECTL_CMD: "kubectl --context {{.CLUSTER_NAME}}"

tasks:
  resources:
    desc: Gather common resources in your cluster, useful when asking for support
    cmds:
      - for: { var: resource }
        cmd: '{{.KUBECTL_CMD}} get {{.ITEM}} {{.CLI_ARGS | default "-A"}}'
    vars:
      resource: >-
        nodes
        gitrepositories
        kustomizations
        helmrepositories
        helmreleases
        certificates
        certificaterequests
        ingresses
        pods

  kubeconform:
    desc: Validate Kubernetes manifests with kubeconform
    cmd: bash {{.KUBECONFORM_SCRIPT}} {{.KUBERNETES_DIR}}/{{.CLUSTER}}
    preconditions:
      - msg: Missing kubeconform script
        sh: test -f {{.KUBECONFORM_SCRIPT}}

  top:
    desc: List top metrics
    cmds:
      - "{{.KUBECTL_CMD}} top node"
      - "{{.KUBECTL_CMD}} top pod -A"

  browse-pvc:
    desc: Browse PersistentVolumeClaims
    summary: |
      Args:
        ns: Namespace to browse PersistentVolumeClaims in (default: default)
        claim: PersistentVolumeClaim to browse (required)
    interactive: true
    cmd: "{{.KUBECTL_CMD}} browse-pvc --namespace {{.ns}} {{.claim}}"
    vars:
      ns: '{{.ns | default "default"}}'
    requires:
      vars: ["claim"]

  drain:
    desc: Drain a node
    summary: |
      Args:
        node: Node to drain (required)
    cmd: "{{.KUBECTL_CMD}} drain {{.node}} --ignore-daemonsets --delete-emptydir-data --force"
    requires:
      vars: ["node"]

  sync-externalsecret:
    desc: Force-sync an ExternalSecret
    summary: |
      Args:
        ns: Namespace the ExternalSecret exists in (default: default)
        name: ExternalSecret to sync (required)
    cmd: "{{.KUBECTL_CMD}} -n {{.ns}} annotate externalsecret {{.name}} force-sync=$(date +%s) --overwrite"
    vars:
      ns: '{{.ns | default "default"}}'
    requires:
      vars: ["name"]

  sanitize:
    desc: Delete pods that aren't working as intended
    cmds:
      - for: ["Evicted", "Failed", "Succeeded"]
        cmd: "{{.KUBECTL_CMD}} delete pods --field-selector status.phase={{.ITEM}} -A --ignore-not-found=true"

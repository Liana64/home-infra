---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  apply:
    desc: Apply a tofu project, e.g. `task tofu:apply project=talos`
    cmd: tofu -chdir={{.ROOT_DIR}}/tofu/projects/{{.project}} apply
    requires:
      vars: ["project"]
    preconditions:
      - msg: Missing tofu project directory
        sh: test -d {{.ROOT_DIR}}/tofu/projects/{{.project}}

  plan:
    desc: Plan a tofu project, e.g. `task tofu:plan project=talos`
    cmd: tofu -chdir={{.ROOT_DIR}}/tofu/projects/{{.project}} plan
    requires:
      vars: ["project"]
    preconditions:
      - msg: Missing tofu project directory
        sh: test -d {{.ROOT_DIR}}/tofu/projects/{{.project}}

  fmt:
    desc: Format all tofu files
    cmd: tofu fmt -recursive {{.ROOT_DIR}}/tofu

  nuke-talos:
    desc: Destroy the talos tofu project
    prompt: "This will destroy all talos infrastructure. Continue?"
    cmd: tofu -chdir={{.ROOT_DIR}}/tofu/projects/talos destroy -auto-approve
    requires:
      vars: ["TF_VAR_proxmox_username"]
    preconditions:
      - msg: Missing tofu project directory
        sh: test -d {{.ROOT_DIR}}/tofu/projects/talos
